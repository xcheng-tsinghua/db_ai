version: '3.8'

services:
  agent-backend:
    build: .
    image: dify-langgraph-qwen-backend:latest
    container_name: dify-langgraph-qwen-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=true

